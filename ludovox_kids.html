<title>Ludovox — Jeux pour enfants par âge</title>

<style>
  :root {
    --bg: #faf7f2;
    --card: #fff;
    --ink: #1f2024;
    --muted: #6b6f76;
    --accent: #d94f4f;
    --accent-2: #2a8fbd;
    --border: #e7e2d8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(250,247,242,.96);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 22px;
  }
  h1 {
    margin: 0 0 10px 0;
    font-size: 20px;
    letter-spacing: .2px;
  }
  h1 small { color: var(--muted); font-weight: 400; margin-left: 8px; font-size: 14px; }
  .tabs {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .tab {
    appearance: none; border: 1px solid var(--border); background: var(--card);
    padding: 7px 14px; border-radius: 999px; cursor: pointer; font: inherit;
    color: var(--ink); transition: all .12s;
  }
  .tab:hover { border-color: var(--accent); }
  .tab.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .tab .count { opacity: .7; font-size: 12px; margin-left: 6px; }
  .search {
    margin-top: 10px;
    width: 100%; max-width: 360px;
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
    font: inherit; background: var(--card);
  }
  main { padding: 22px; max-width: 1400px; margin: 0 auto; }
  .age-section { display: none; }
  .age-section.active { display: block; }
  .age-section h2 {
    margin: 0 0 16px 0; font-size: 22px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; display: flex; flex-direction: column;
    transition: transform .12s, box-shadow .12s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.06); }
  .thumb {
    position: relative; width: 100%; aspect-ratio: 16/9;
    background: #000 center/cover no-repeat;
    cursor: pointer; display: block; text-decoration: none;
  }
  .thumb::after {
    content: "▶";
    position: absolute; inset: 0; display: grid; place-items: center;
    color: #fff; font-size: 42px; text-shadow: 0 2px 12px rgba(0,0,0,.6);
    transition: transform .12s;
  }
  .thumb:hover::after { transform: scale(1.15); }
  .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .title { font-weight: 600; line-height: 1.25; }
  .meta { color: var(--muted); font-size: 12px; line-height: 1.4; }
  .links { margin-top: auto; padding-top: 6px; display: flex; gap: 10px; font-size: 12px; }
  .links a { color: var(--accent-2); text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  .empty { color: var(--muted); padding: 30px; text-align: center; }
  @media (max-width: 540px) {
    main { padding: 14px; }
    .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .body { padding: 10px; }
    .title { font-size: 14px; }
    .meta { font-size: 11px; }
  }
</style>
</head>

const tabs = document.getElementById('tabs');
const main = document.getElementById('main');
const search = document.getElementById('search');

let activeAge = null;
let query = '';

function thumbUrl(vid) {
  return `https://i.ytimg.com/vi/${vid}/hqdefault.jpg`;
}

function render() {
  // tabs
  tabs.innerHTML = '';
  DATA.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (s.age === activeAge ? ' active' : '');
    btn.innerHTML = `${s.label} <span class="count">${s.count}</span>`;
    btn.onclick = () => { activeAge = s.age; query = ''; search.value = ''; render(); persist(); };
    tabs.appendChild(btn);
  });

  // sections
  main.innerHTML = '';
  const section = DATA.find(s => s.age === activeAge);
  if (!section) return;

  const sec = document.createElement('section');
  sec.className = 'age-section active';
  const q = query.trim().toLowerCase();
  const games = q ? section.games.filter(g => g.name.toLowerCase().includes(q)) : section.games;

  const h2 = document.createElement('h2');
  h2.textContent = `${section.label} — ${games.length}${q ? ' / ' + section.games.length : ''} jeux`;
  sec.appendChild(h2);

  if (!games.length) {
    const e = document.createElement('div');
    e.className = 'empty';
    e.textContent = 'Aucun jeu ne correspond à ce filtre.';
    sec.appendChild(e);
  } else {
    const grid = document.createElement('div');
    grid.className = 'grid';
    games.forEach(g => grid.appendChild(card(g)));
    sec.appendChild(grid);
  }
  main.appendChild(sec);
}

function card(g) {
  const c = document.createElement('article');
  c.className = 'card';

  const t = document.createElement('a');
  t.className = 'thumb';
  t.href = `https://youtu.be/${g.vid}`;
  t.target = '_blank';
  t.rel = 'noopener';
  t.style.backgroundImage = `url('${thumbUrl(g.vid)}')`;
  t.title = 'Ouvrir sur YouTube';
  c.appendChild(t);

  const body = document.createElement('div');
  body.className = 'body';
  const title = document.createElement('div');
  title.className = 'title';
  title.textContent = g.name;
  body.appendChild(title);
  if (g.meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = g.meta;
    body.appendChild(m);
  }
  const links = document.createElement('div');
  links.className = 'links';
  const yt = document.createElement('a');
  yt.href = `https://youtu.be/${g.vid}`;
  yt.target = '_blank'; yt.rel = 'noopener';
  yt.textContent = 'YouTube ↗';
  links.appendChild(yt);
  if (g.bgg) {
    const b = document.createElement('a');
    b.href = g.bgg; b.target = '_blank'; b.rel = 'noopener';
    b.textContent = 'BGG ↗';
    links.appendChild(b);
  }
  body.appendChild(links);
  c.appendChild(body);
  return c;
}

function persist() {
  try { localStorage.setItem('ludovox-age', String(activeAge)); } catch(e) {}
  history.replaceState(null, '', '#' + activeAge);
}

search.addEventListener('input', e => { query = e.target.value; render(); });

// initial age
const hashAge = parseInt((location.hash || '').slice(1), 10);
const stored = parseInt(localStorage.getItem('ludovox-age') || '', 10);
activeAge = [hashAge, stored, 3].find(v => Number.isFinite(v) && DATA.some(s => s.age === v));
render();
</script>
